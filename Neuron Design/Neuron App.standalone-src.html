<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<title>Neuron</title>
<link rel="stylesheet" href="app/styles.css"/>
<link rel="stylesheet" href="app/app.css"/>
<link rel="stylesheet" href="app/terminal.css"/>
<style>
  html, body { margin: 0; height: 100%; background: var(--background); color: var(--foreground); }
  * { box-sizing: border-box; }
  /* Density tweak */
  html[data-density="compact"] .node-card { height: 100px; padding-top: 9px; padding-bottom: 8px; }
  html[data-density="compact"] .sb-item   { padding: 5px 10px; }
  html[data-density="compact"] .runs-table th,
  html[data-density="compact"] .runs-table td { padding: 7px 12px; }
  /* Motion tweak */
  html[data-motion="off"] *,
  html[data-motion="off"] *::before,
  html[data-motion="off"] *::after { animation: none !important; transition: none !important; }
  html[data-motion="reduced"] .pulse-dot,
  html[data-motion="reduced"] .ins-pulse,
  html[data-motion="reduced"] .wf-shimmer,
  html[data-motion="reduced"] .ins-stream-cursor { animation: none !important; }
  html[data-motion="reduced"] .node-card.status-running .node-rail { animation: none !important; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="app/data.js"></script>
  <script src="app/terminal-data.js"></script>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/shell.jsx"></script>
  <script type="text/babel" src="app/canvas.jsx"></script>
  <script type="text/babel" src="app/inspector.jsx"></script>
  <script type="text/babel" src="app/routes.jsx"></script>
  <script type="text/babel" src="app/terminal.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
