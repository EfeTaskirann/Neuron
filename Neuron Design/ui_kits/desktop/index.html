<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<title>Neuron — Desktop UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--background); color: var(--foreground); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
  @keyframes nodePulse {
    0%,100% { box-shadow: 0 0 0 1px oklch(0.737 0.159 299 / 0.4), 0 0 12px 0 oklch(0.643 0.214 298 / 0.35); }
    50%     { box-shadow: 0 0 0 1px oklch(0.737 0.159 299 / 0.55), 0 0 24px 4px oklch(0.643 0.214 298 / 0.5); }
  }
  @keyframes spanPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes edgeFlow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -20; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Canvas.jsx"></script>
<script type="text/babel" src="RunInspector.jsx"></script>
<script type="text/babel" src="Marketplace.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;
const { Icon, Brandmark, Kbd, StatusDot, Badge, Button } = window.NeuronUI;

const NAV = [
  { id: "workflows",   label: "Workflows",   icon: "workflow" },
  { id: "agents",      label: "Agents",      icon: "bot" },
  { id: "servers",     label: "MCP Servers", icon: "plug" },
  { id: "runs",        label: "Runs",        icon: "activity" },
  { id: "marketplace", label: "Marketplace", icon: "store" },
];

const Sidebar = ({ active, setActive }) => (
  <aside style={{
    width: 244, background: "var(--card)", borderRight: "1px solid var(--border)",
    display: "grid", gridTemplateRows: "auto 1fr auto", overflow: "hidden",
  }}>
    {/* Workspace switcher */}
    <div style={{ padding: "12px 12px 10px", borderBottom: "1px solid var(--border)" }}>
      <button style={{
        display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "6px 8px",
        background: "transparent", border: "1px solid var(--border)", borderRadius: 8,
        cursor: "pointer", color: "var(--foreground)",
      }}>
        <Brandmark size={28} />
        <div style={{ flex: 1, textAlign: "left", minWidth: 0 }}>
          <div style={{ fontSize: 12, fontWeight: 600 }}>Personal</div>
          <div style={{ fontSize: 10, color: "var(--muted-foreground)" }}>3 workflows</div>
        </div>
        <Icon name="chevron" size={14} color="var(--muted-foreground)" />
      </button>
    </div>
    {/* Nav */}
    <nav style={{ padding: 8, overflow: "auto" }}>
      <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase",
        color: "var(--muted-foreground)", padding: "10px 10px 6px" }}>Navigate</div>
      {NAV.map(item => {
        const isActive = active === item.id;
        return (
          <button key={item.id} onClick={() => setActive(item.id)} style={{
            display: "flex", alignItems: "center", gap: 10, width: "100%", height: 32, padding: "0 10px",
            background: isActive ? "oklch(0.470 0.207 296 / 0.5)" : "transparent",
            color: isActive ? "var(--foreground)" : "var(--muted-foreground)",
            border: "none", cursor: "pointer", fontFamily: "var(--font-sans)",
            fontSize: 13, fontWeight: 500, borderRadius: 6, marginBottom: 2,
            position: "relative", textAlign: "left",
          }}>
            {isActive && <span style={{ position: "absolute", left: -2, top: 6, bottom: 6, width: 2, borderRadius: 2, background: "var(--neuron-violet-500)" }} />}
            <Icon name={item.icon} size={16} />
            {item.label}
          </button>
        );
      })}
    </nav>
    {/* User */}
    <div style={{ padding: 10, borderTop: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 26, height: 26, borderRadius: 9999, background: "linear-gradient(135deg, var(--neuron-violet-400), var(--neuron-violet-700))", display: "grid", placeItems: "center", color: "#fff", fontSize: 11, fontWeight: 600 }}>EÇ</div>
      <div style={{ flex: 1, fontSize: 12, fontWeight: 500 }}>Efe Çay</div>
      <button onClick={() => setActive("settings")} style={{ width: 24, height: 24, background: "transparent", border: "none", color: "var(--muted-foreground)", cursor: "pointer", display: "grid", placeItems: "center", borderRadius: 4 }}>
        <Icon name="settings" size={14} />
      </button>
    </div>
  </aside>
);

const Topbar = ({ active, theme, setTheme }) => (
  <header style={{ height: 48, borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", background: "var(--card)" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
      <span style={{ color: "var(--muted-foreground)" }}>Personal</span>
      <span style={{ color: "var(--muted-foreground)" }}>/</span>
      <span style={{ fontWeight: 500, textTransform: "capitalize" }}>{active}</span>
      {active === "workflows" && <><span style={{ color: "var(--muted-foreground)" }}>/</span><span style={{ fontWeight: 500 }}>Daily summary</span></>}
    </div>
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <button style={{ display: "flex", alignItems: "center", gap: 8, height: 28, padding: "0 10px", borderRadius: 8, background: "var(--muted)", border: "1px solid var(--border)", color: "var(--muted-foreground)", cursor: "pointer", fontSize: 12, fontFamily: "var(--font-sans)" }}>
        <Icon name="search" size={12} />Search<Kbd>⌘K</Kbd>
      </button>
      <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} style={{ width: 28, height: 28, borderRadius: 6, background: "transparent", border: "none", color: "var(--muted-foreground)", cursor: "pointer", display: "grid", placeItems: "center" }}>
        <Icon name={theme === "dark" ? "sun" : "moon"} size={14} />
      </button>
    </div>
  </header>
);

const Inspector = ({ open, onClose }) => {
  if (!open) return null;
  return (
    <aside style={{ width: 360, borderLeft: "1px solid var(--border)", background: "var(--card)", display: "grid", gridTemplateRows: "auto auto 1fr", overflow: "hidden" }}>
      <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Icon name="sparkles" size={16} color="var(--neuron-violet-400)" />
          <div style={{ fontSize: 13, fontWeight: 600 }}>Reasoner</div>
          <Badge><StatusDot variant="running" />running</Badge>
        </div>
        <button onClick={onClose} style={{ width: 24, height: 24, borderRadius: 4, background: "transparent", border: "none", color: "var(--muted-foreground)", cursor: "pointer", display: "grid", placeItems: "center" }}>
          <Icon name="close" size={14} />
        </button>
      </div>
      <nav style={{ display: "flex", gap: 0, padding: "0 12px", borderBottom: "1px solid var(--border)" }}>
        {["Details", "Logs", "Tokens", "Tools"].map((t, i) => (
          <button key={t} style={{
            padding: "10px 12px", background: "transparent", border: "none", cursor: "pointer",
            fontSize: 12, fontWeight: 500, fontFamily: "var(--font-sans)",
            color: i === 0 ? "var(--foreground)" : "var(--muted-foreground)",
            borderBottom: i === 0 ? "2px solid var(--neuron-violet-500)" : "2px solid transparent",
          }}>{t}</button>
        ))}
      </nav>
      <div style={{ padding: 16, overflow: "auto" }}>
        {[
          ["Model", "gpt-4o"],
          ["Temperature", "0.4"],
          ["Tokens used", "2,418 / 8k"],
          ["Cost", "$0.0072"],
          ["Latency", "0.92s"],
        ].map(([k, v]) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
            <span style={{ color: "var(--muted-foreground)" }}>{k}</span>
            <span style={{ fontFamily: k === "Model" ? "var(--font-mono)" : "var(--font-sans)", fontWeight: 500 }}>{v}</span>
          </div>
        ))}
        <div style={{ marginTop: 16, padding: 12, borderRadius: 10, background: "var(--background)", border: "1px solid var(--border)", fontFamily: "var(--font-mono)", fontSize: 11, lineHeight: 1.6, color: "var(--muted-foreground)" }}>
          <span style={{ color: "var(--neuron-violet-300)" }}>{"// system"}</span><br/>
          You synthesize a daily<br/>summary from the docs and<br/>web context provided.
        </div>
      </div>
    </aside>
  );
};

const App = () => {
  const [active, setActive] = useState("workflows");
  const [theme, setTheme] = useState("dark");
  const [inspectorOpen, setInspectorOpen] = useState(true);

  useEffect(() => {
    document.documentElement.classList.toggle("dark", theme === "dark");
  }, [theme]);

  const showInspector = active === "workflows" && inspectorOpen;

  return (
    <div style={{ display: "grid", gridTemplateColumns: `244px 1fr ${showInspector ? "360px" : "0px"}`, gridTemplateRows: "48px 1fr", height: "100vh", overflow: "hidden", transition: "grid-template-columns 240ms var(--ease-out-soft)" }}>
      <div style={{ gridRow: "1 / 3" }}><Sidebar active={active} setActive={setActive} /></div>
      <div style={{ gridColumn: "2 / 4" }}><Topbar active={active} theme={theme} setTheme={setTheme} /></div>
      <main style={{ overflow: "hidden", gridColumn: "2 / 3" }}>
        {active === "workflows" && <window.NeuronCanvas selectedId="n4" onSelect={() => setInspectorOpen(true)} />}
        {active === "runs" && <window.NeuronRunInspector />}
        {active === "marketplace" && <window.NeuronMarketplace />}
        {active === "settings" && <window.NeuronSettings theme={theme} setTheme={setTheme} />}
        {active === "agents" && <EmptyState label="agent" cta="Add agent" icon="bot" />}
        {active === "servers" && <EmptyState label="MCP server" cta="Connect server" icon="plug" />}
      </main>
      {showInspector && <div style={{ gridColumn: "3 / 4" }}><Inspector open={true} onClose={() => setInspectorOpen(false)} /></div>}
    </div>
  );
};

const EmptyState = ({ label, cta, icon }) => (
  <div style={{ height: "100%", display: "grid", placeItems: "center", padding: 32 }}>
    <div style={{ textAlign: "center", maxWidth: 380 }}>
      <div style={{ width: 64, height: 64, borderRadius: 16, background: "linear-gradient(135deg, var(--neuron-midnight-800), var(--neuron-midnight-950))", display: "grid", placeItems: "center", color: "var(--neuron-violet-300)", margin: "0 auto 16px", boxShadow: "var(--glow-violet-sm)" }}>
        <Icon name={icon} size={28} />
      </div>
      <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 6 }}>No {label}s yet</div>
      <div style={{ fontSize: 13, color: "var(--muted-foreground)", marginBottom: 16, lineHeight: 1.5 }}>Start with the basics — you can always add more later.</div>
      <Button leftIcon="plus">{cta}</Button>
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
