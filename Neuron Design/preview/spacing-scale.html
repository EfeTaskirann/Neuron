<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 22px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted-foreground);margin:0 0 14px;}
.row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.bar{height:18px;background:var(--neuron-violet-500);border-radius:3px;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);width:60px;flex:none;}
.px{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);margin-left:auto;}
</style></head>
<body>
<div class="label">Spacing · 4px base grid</div>
<div class="row"><span class="tok">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
<div class="row"><span class="tok">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
<div class="row"><span class="tok">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
<div class="row"><span class="tok">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px · stack-md</span></div>
<div class="row"><span class="tok">space-6</span><div class="bar" style="width:24px"></div><span class="px">24px · gutter</span></div>
<div class="row"><span class="tok">space-8</span><div class="bar" style="width:32px"></div><span class="px">32px · stack-lg</span></div>
<div class="row"><span class="tok">space-12</span><div class="bar" style="width:48px"></div><span class="px">48px · section</span></div>
<div class="row"><span class="tok">space-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</body></html>
