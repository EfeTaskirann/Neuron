<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px 20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.cell{text-align:center;}
.box{height:60px;border-radius:12px;background:var(--card);}
.label{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);margin-top:11px;}
.tag{font-size:10px;color:var(--muted-foreground);margin-top:2px;}
.title{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted-foreground);margin:0 0 18px;}
@keyframes focusShimmer{
  0%,100%{box-shadow:0 0 0 1px oklch(0.660 0.108 258 / 0.55),0 0 12px 0 oklch(0.540 0.130 258 / 0.45);}
  50%   {box-shadow:0 0 0 1px oklch(0.778 0.072 258 / 0.75),0 0 22px 2px oklch(0.660 0.108 258 / 0.65);}
}
.shimmer{animation:focusShimmer 1.6s ease-in-out infinite;}
</style></head>
<body>
<div class="title">Synaptic glow · brand signature</div>
<div class="grid">
  <div class="cell"><div class="box shimmer"></div><div class="label">glow-focus-sm</div><div class="tag">keyboard focus · midnight</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--glow-violet-md)"></div><div class="label">glow-violet-md</div><div class="tag">selected node · running</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--glow-violet-sm)"></div><div class="label">glow-violet-sm</div><div class="tag">hover CTA</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--glow-emerald-sm)"></div><div class="label">glow-emerald-sm</div><div class="tag">success state</div></div>
</div>
</body></html>
