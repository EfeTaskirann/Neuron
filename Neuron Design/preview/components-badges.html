<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 22px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;}
.label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted-foreground);font-weight:600;width:80px;flex:none;}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--secondary);color:var(--secondary-foreground);}
.dot{width:8px;height:8px;border-radius:9999px;flex:none;}
.feat{background:linear-gradient(135deg,var(--neuron-violet-600),var(--neuron-violet-800));color:#fff;border-radius:9999px;padding:3px 10px;font-size:11px;font-weight:600;}
.outline{background:transparent;border:1px solid var(--border);color:var(--muted-foreground);}
.kbd{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--muted);border:1px solid var(--border);color:var(--muted-foreground);}
</style></head>
<body>
<div class="row"><span class="label">Status dots</span>
  <span class="badge"><span class="dot" style="background:var(--neuron-emerald-500);box-shadow:var(--glow-emerald-sm)"></span>online</span>
  <span class="badge"><span class="dot" style="background:var(--neuron-amber-500)"></span>degraded</span>
  <span class="badge"><span class="dot" style="background:var(--neuron-slate-500)"></span>offline</span>
  <span class="badge"><span class="dot" style="background:var(--neuron-rose-500)"></span>error</span>
</div>
<div class="row"><span class="label">Badges</span>
  <span class="badge">Beta</span>
  <span class="feat">Featured</span>
  <span class="badge outline">community</span>
  <span class="badge" style="background:var(--neuron-violet-900);color:var(--neuron-violet-200)">v1.2.0</span>
</div>
<div class="row"><span class="label">Kbd hints</span>
  <span class="kbd">⌘K</span>
  <span class="kbd">⇧⌘P</span>
  <span class="kbd">Esc</span>
  <span class="kbd">⌘,</span>
  <span class="kbd">⌘N</span>
</div>
</body></html>
