<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:16px 20px 18px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.title{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted-foreground);margin:0 0 4px;display:flex;justify-content:space-between;align-items:baseline;}
.title .now{font-family:var(--font-mono);font-size:10px;color:var(--neuron-violet-300);letter-spacing:0.04em;text-transform:none;font-weight:500;}

/* Ruler */
.ruler{display:grid;grid-template-columns:200px 1fr;gap:10px;font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground);padding:6px 0 4px;border-bottom:1px solid var(--border);}
.ticks{display:grid;grid-template-columns:repeat(5,1fr);}
.ticks span{border-left:1px dashed oklch(0.310 0.060 258 / 0.5);padding-left:4px;}
.ticks span:first-child{border-left:none;padding-left:0;}

.row{display:grid;grid-template-columns:200px 1fr;align-items:center;height:28px;gap:10px;}
.row + .row{border-top:1px solid oklch(0.310 0.060 258 / 0.35);}
.span-name{display:flex;align-items:center;gap:6px;font-size:12px;min-width:0;}
.span-name .glyph{font-family:var(--font-mono);color:var(--muted-foreground);font-size:10px;flex:none;}
.span-name .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.span-name .toks{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);margin-left:auto;padding-left:6px;flex:none;}
.dot{width:6px;height:6px;border-radius:9999px;flex:none;}

.bar-track{height:18px;position:relative;}
.bar{position:absolute;top:3px;height:12px;border-radius:3px;display:flex;align-items:center;}
.dur{position:absolute;top:3px;height:12px;line-height:12px;font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);}

/* Done bars use a subtle gradient (start brighter, taper) */
.bar.done{background:linear-gradient(90deg, oklch(0.643 0.214 298 / 0.95), oklch(0.643 0.214 298 / 0.55));}
.bar.done.sky{background:linear-gradient(90deg, oklch(0.715 0.145 232 / 0.95), oklch(0.715 0.145 232 / 0.55));}
.bar.done.slate{background:linear-gradient(90deg, oklch(0.555 0.020 258 / 0.9), oklch(0.555 0.020 258 / 0.5));}
.bar.parent{background:linear-gradient(90deg, oklch(0.470 0.207 296 / 0.55), oklch(0.643 0.214 298 / 0.45));border:1px solid oklch(0.737 0.159 299 / 0.35);}

/* RUNNING — animated; sweep highlight + leading edge glow */
.bar.running{
  background:linear-gradient(90deg, oklch(0.643 0.214 298 / 0.85) 0%, oklch(0.737 0.159 299 / 0.95) 100%);
  box-shadow:0 0 0 1px oklch(0.737 0.159 299 / 0.6), 0 0 14px 0 oklch(0.643 0.214 298 / 0.55);
  overflow:hidden;
}
.bar.running::before{
  /* moving sheen — narrow bright band sweeps left→right */
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,
    transparent 0%,
    oklch(0.946 0.029 305 / 0.0) 35%,
    oklch(0.946 0.029 305 / 0.55) 50%,
    oklch(0.946 0.029 305 / 0.0) 65%,
    transparent 100%);
  background-size:220% 100%;
  animation:sheen 1.6s linear infinite;
  mix-blend-mode:screen;
}
.bar.running::after{
  /* leading-edge pulse — bright tip that throbs */
  content:"";position:absolute;top:-1px;bottom:-1px;right:-2px;width:10px;border-radius:0 4px 4px 0;
  background:radial-gradient(ellipse at left, oklch(0.946 0.029 305 / 0.95), oklch(0.737 0.159 299 / 0) 70%);
  animation:tip 1.2s ease-in-out infinite;
}
@keyframes sheen{
  0%   {background-position:-110% 0;}
  100% {background-position:110% 0;}
}
@keyframes tip{
  0%,100%{opacity:0.55;transform:scaleX(1);}
  50%    {opacity:1;transform:scaleX(1.6);}
}

/* Pending bar — faint dashed scaffold, no fill yet */
.bar.pending{background:transparent;border:1px dashed oklch(0.310 0.060 258 / 0.7);}
</style></head>
<body>
<div class="title"><span>Run inspector · waterfall</span><span class="now">▸ trace 9c2f · 1.84s elapsed</span></div>

<div class="ruler">
  <div></div>
  <div class="ticks"><span>0s</span><span>0.5</span><span>1.0</span><span>1.5</span><span>2.0s</span></div>
</div>

<div class="row">
  <div class="span-name"><span class="glyph">▾</span><span class="dot" style="background:var(--neuron-violet-500)"></span><span class="label">orchestrator.run</span><span class="toks">3.4k</span></div>
  <div class="bar-track">
    <div class="bar parent" style="left:1%;width:96%"></div>
    <div class="dur" style="left:calc(1% + 96%);margin-left:6px">1.84s</div>
  </div>
</div>
<div class="row">
  <div class="span-name" style="padding-left:14px"><span class="glyph">└</span><span class="dot" style="background:var(--neuron-violet-500)"></span><span class="label">llm.reason</span><span class="toks">1.1k</span></div>
  <div class="bar-track"><div class="bar done" style="left:3%;width:36%"></div><div class="dur" style="left:calc(3% + 36%);margin-left:6px">680ms</div></div>
</div>
<div class="row">
  <div class="span-name" style="padding-left:14px"><span class="glyph">└</span><span class="dot" style="background:var(--neuron-sky-500)"></span><span class="label">tool.fetch_docs</span><span class="toks">—</span></div>
  <div class="bar-track"><div class="bar done sky" style="left:39%;width:18%"></div><div class="dur" style="left:calc(39% + 18%);margin-left:6px">340ms</div></div>
</div>
<div class="row">
  <div class="span-name" style="padding-left:14px"><span class="glyph">└</span><span class="dot" style="background:var(--neuron-violet-500)"></span><span class="label">llm.synthesize</span><span class="toks">2.3k</span></div>
  <div class="bar-track"><div class="bar running" style="left:57%;width:32%"></div></div>
</div>
<div class="row">
  <div class="span-name" style="padding-left:14px;opacity:0.6"><span class="glyph">└</span><span class="dot" style="background:var(--neuron-slate-500)"></span><span class="label">logic.route</span><span class="toks">queued</span></div>
  <div class="bar-track"><div class="bar pending" style="left:89%;width:8%"></div></div>
</div>
</body></html>
