<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.node{width:240px;border-radius:16px;background:var(--card);border:1px solid var(--border);padding:12px 14px 12px 16px;position:relative;overflow:hidden;}
.node::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:2px;}
.node.llm::before{background:var(--neuron-violet-500);}
.node.tool::before{background:var(--neuron-sky-500);}
.node.logic::before{background:var(--neuron-slate-500);}
.node.human::before{background:var(--neuron-amber-500);}
.node.selected{box-shadow:var(--glow-violet-md);border-color:transparent;}
.head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.icon{width:18px;height:18px;}
.title{font-size:14px;font-weight:600;flex:1;}
.dot{width:8px;height:8px;border-radius:9999px;}
.meta{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono);}
</style></head>
<body>
<div class="node llm selected">
  <div class="head">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--neuron-violet-400)" stroke-width="1.75" stroke-linecap="round"><circle cx="12" cy="12" r="2" fill="currentColor"/><path d="M12 5.5 a 6.5 6.5 0 0 1 6.5 6.5"/><path d="M12 18.5 a 6.5 6.5 0 0 1 -6.5 -6.5"/></svg>
    <span class="title">Reasoner</span>
    <span class="dot" style="background:var(--neuron-violet-400);box-shadow:var(--glow-violet-sm)"></span>
  </div>
  <div class="meta">gpt-4o · 1.2k tok</div>
</div>
<div class="node tool">
  <div class="head">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--neuron-sky-500)" stroke-width="1.75" stroke-linecap="round"><path d="M14.5 6.5 L 18 3 L 21 6 L 17.5 9.5 L 9 18 L 6 21 L 3 18 L 6 13 L 14.5 6.5 Z"/></svg>
    <span class="title">fetch_docs</span>
    <span class="dot" style="background:var(--neuron-emerald-500)"></span>
  </div>
  <div class="meta">tool · ready</div>
</div>
<div class="node logic">
  <div class="head">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--neuron-slate-500)" stroke-width="1.75" stroke-linecap="round"><circle cx="5" cy="12" r="1.4" fill="currentColor"/><path d="M6.4 12 L 11 12 L 11 6"/><path d="M11 12 L 11 18"/></svg>
    <span class="title">If route</span>
    <span class="dot" style="background:var(--neuron-slate-500)"></span>
  </div>
  <div class="meta">logic · idle</div>
</div>
<div class="node human">
  <div class="head">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--neuron-amber-500)" stroke-width="1.75" stroke-linecap="round"><path d="M9 13 L 9 5 a 1.2 1.2 0 0 1 2.4 0 L 11.4 11"/><path d="M16.2 12 L 16.2 8 a 1.2 1.2 0 0 1 2.4 0 L 18.6 15 a 6 6 0 0 1 -11 3"/></svg>
    <span class="title">Approve plan</span>
    <span class="dot" style="background:var(--neuron-amber-500)"></span>
  </div>
  <div class="meta">human · waiting</div>
</div>
</body></html>
