<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:18px 22px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.row{display:grid;grid-template-columns:80px 1fr 110px;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--border);}
.row:last-child{border:none;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);text-align:right;}
.muted{color:var(--muted-foreground);}
</style></head>
<body>
<div class="row"><span class="tok">body-lg</span><span class="text-body-lg">Build, observe, and orchestrate.</span><span class="spec">16 / 400</span></div>
<div class="row"><span class="tok">body</span><span class="text-body">Default UI text. The 14px workhorse.</span><span class="spec">14 / 400</span></div>
<div class="row"><span class="tok">body-sm</span><span class="text-body-sm muted">Secondary information, helper copy.</span><span class="spec">13 / 400</span></div>
<div class="row"><span class="tok">caption</span><span class="text-caption muted">Badges, status pills, dense rows</span><span class="spec">12 / 500</span></div>
<div class="row"><span class="tok">overline</span><span class="text-overline muted">Section label</span><span class="spec">11 / 600 / 0.08</span></div>
<div class="row"><span class="tok">code</span><span class="text-code">await runner.invoke(span)</span><span class="spec">13 / mono</span></div>
</body></html>
