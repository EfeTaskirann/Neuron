<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);display:grid;grid-template-columns:repeat(7,1fr);gap:14px;}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 6px;border-radius:10px;background:var(--card);border:1px solid var(--border);}
.cell svg{color:var(--neuron-violet-300);}
.name{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);text-align:center;}
</style></head>
<body>
<div class="cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.2" fill="currentColor" stroke="none"/><path d="M7.5 7.5 C 11 10, 13 14, 16.5 16.5"/><circle cx="18" cy="18" r="2.6"/></svg><div class="name">synapse</div></div>
<div class="cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="12" cy="12" r="2" fill="currentColor"/><path d="M12 5.5 a 6.5 6.5 0 0 1 6.5 6.5"/><path d="M12 18.5 a 6.5 6.5 0 0 1 -6.5 -6.5"/><path d="M12 2.5 a 9.5 9.5 0 0 1 9.5 9.5"/><path d="M12 21.5 a 9.5 9.5 0 0 1 -9.5 -9.5"/></svg><div class="name">node-llm</div></div>

<div class="cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><path d="M6.6 12 L 11 12 L 11 5.5"/><path d="M11 12 L 11 18.5"/><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg><div class="name">node-logic</div></div>
