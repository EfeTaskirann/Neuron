<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:18px 22px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.row{display:grid;grid-template-columns:62px 1fr 130px;align-items:baseline;gap:14px;padding:8px 0;border-bottom:1px solid var(--border);}
.row:last-child{border:none;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);text-align:right;}
.title{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted-foreground);margin:0 0 10px;}
</style></head>
<body>
<div class="title">Display · Geist Black 900</div>
<div class="row"><span class="tok">display</span><span class="text-display">Where agents</span><span class="spec">48 / 900 / -0.02</span></div>
<div class="row"><span class="tok">h1</span><span class="text-h1">Connect a server</span><span class="spec">32 / 900 / -0.015</span></div>
<div class="row"><span class="tok">h2</span><span class="text-h2">Run inspector</span><span class="spec">24 / 600 / -0.01</span></div>
<div class="row"><span class="tok">h3</span><span class="text-h3">Workflow canvas</span><span class="spec">20 / 600 / -0.005</span></div>
<div class="row"><span class="tok">h4</span><span class="text-h4">Node title</span><span class="spec">16 / 600</span></div>
</body></html>
