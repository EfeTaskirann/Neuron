<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.row{display:flex;flex-direction:column;gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-size:11px;font-weight:500;color:var(--muted-foreground);letter-spacing:0.01em;}
input{font-family:var(--font-sans);font-size:13px;padding:0 12px;height:36px;border-radius:8px;background:var(--input);border:1px solid var(--border);color:var(--foreground);outline:none;transition:all 120ms var(--ease-out);}
input:focus{border-color:var(--neuron-violet-500);box-shadow:var(--glow-violet-sm);}
input::placeholder{color:var(--muted-foreground);}
.split{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.switch{width:32px;height:18px;border-radius:9999px;background:var(--neuron-violet-500);position:relative;}
.switch::after{content:"";position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:9999px;background:#fff;}
.switch.off{background:var(--neuron-midnight-700);}
.switch.off::after{left:2px;right:auto;}
</style></head>
<body>
<div class="row">
  <div class="split">
    <div class="field"><label>Workflow name</label><input value="Daily summary"></div>
    <div class="field"><label>API key</label><input type="password" value="sk-•••••••••••••••" style="font-family:var(--font-mono)"></div>
  </div>
  <div class="field"><label>Default model</label><input placeholder="gpt-4o-mini" style="border-color:var(--neuron-violet-500);box-shadow:var(--glow-violet-sm)"></div>
  <div class="toggle"><div><div style="font-size:13px;font-weight:500">Telemetry</div><div style="font-size:11px;color:var(--muted-foreground)">Send anonymous traces</div></div><div class="switch"></div></div>
  <div class="toggle"><div><div style="font-size:13px;font-weight:500">Reduced motion</div><div style="font-size:11px;color:var(--muted-foreground)">Honor system preference</div></div><div class="switch off"></div></div>
</div>
</body></html>
