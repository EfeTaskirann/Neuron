<!doctype html>
<html class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
.card{border-radius:24px;background:var(--card);border:1px solid var(--border);padding:18px;display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center;box-shadow:var(--shadow-sm);}
.icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--neuron-midnight-800),var(--neuron-midnight-950));display:grid;place-items:center;color:var(--neuron-violet-300);}
.title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.feat{background:linear-gradient(135deg,var(--neuron-violet-600),var(--neuron-violet-800));color:#fff;border-radius:9999px;padding:2px 8px;font-size:10px;font-weight:600;}
.desc{font-size:12px;color:var(--muted-foreground);margin-top:3px;line-height:1.45;}
.meta{display:flex;gap:10px;font-size:11px;color:var(--muted-foreground);margin-top:6px;}
.install{background:var(--primary);color:var(--primary-foreground);font-weight:500;font-size:12px;padding:0 14px;height:32px;border-radius:8px;border:none;cursor:pointer;}
</style></head>
<body>
<div class="card">
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M4 8 L 12 4 L 20 8 L 20 16 L 12 20 L 4 16 Z"/><path d="M4 8 L 12 12 L 20 8"/><path d="M12 12 L 12 20"/></svg>
  </div>
  <div>
    <div class="title">Filesystem MCP <span class="feat">Featured</span></div>
    <div class="desc">Read, write, and search the local filesystem from any agent. Sandboxed per-workspace.</div>
    <div class="meta"><span>★ 4.9</span><span>·</span><span>12.4k installs</span><span>·</span><span>Official</span></div>
  </div>
  <button class="install">Install</button>
</div>
</body></html>
